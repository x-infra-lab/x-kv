syntax = "proto3";

package debugpb;

import "metapb.proto";

option java_package = "io.github.xinfra.lab.xkv.proto";
option java_outer_classname = "Debugpb";
option java_multiple_files = false;

// Operator-only RPCs. Read-only peeks into the local store state for
// emergency debugging — never used on the hot path.

service Debug {
    rpc GetRegionInfo(GetRegionInfoRequest) returns (GetRegionInfoResponse);
    rpc GetRaftState(GetRaftStateRequest) returns (GetRaftStateResponse);
    rpc GetSnapshotMeta(GetSnapshotMetaRequest) returns (GetSnapshotMetaResponse);
    rpc GetClusterInfo(GetClusterInfoRequest) returns (GetClusterInfoResponse);
    rpc GetStoreInfo(GetStoreInfoRequest) returns (GetStoreInfoResponse);
    rpc CompactionEvent(CompactionEventRequest) returns (CompactionEventResponse);
    rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
    rpc GetAllRegions(GetAllRegionsRequest) returns (GetAllRegionsResponse);

    // Force a region into local-only mode, e.g. to recover from quorum loss.
    // Refused unless `unsafe_recovery` flag in store config is true.
    rpc UnsafeForceLeader(UnsafeForceLeaderRequest) returns (UnsafeForceLeaderResponse);
}

message GetRegionInfoRequest { uint64 region_id = 1; }
message GetRegionInfoResponse {
    metapb.Region region = 1;
    metapb.Peer leader = 2;
    uint64 applied_index = 3;
    uint64 last_index = 4;
    uint64 commit_index = 5;
    uint64 term = 6;
    bool is_paused = 7;
}

message GetRaftStateRequest { uint64 region_id = 1; }
message GetRaftStateResponse {
    uint64 region_id = 1;
    uint64 term = 2;
    uint64 vote = 3;
    uint64 commit = 4;
    uint64 last_index = 5;
    uint64 first_index = 6;
    uint64 applied_index = 7;
}

message GetSnapshotMetaRequest { uint64 region_id = 1; }
message GetSnapshotMetaResponse {
    bool exists = 1;
    uint64 raft_term = 2;
    uint64 raft_index = 3;
    bytes start_key = 4;
    bytes end_key = 5;
    repeated string cf_names = 6;
    uint64 size_bytes = 7;
}

message GetClusterInfoRequest {}
message GetClusterInfoResponse {
    uint64 cluster_id = 1;
    uint64 store_count = 2;
    uint64 region_count = 3;
}

message GetStoreInfoRequest {}
message GetStoreInfoResponse {
    metapb.Store store = 1;
    uint64 capacity = 2;
    uint64 used = 3;
    uint64 region_count = 4;
}

message CompactionEventRequest {
    string cf = 1;
    bytes start_key = 2;
    bytes end_key = 3;
}
message CompactionEventResponse {}

message GetMetricsRequest { string format = 1; }
message GetMetricsResponse {
    bytes payload = 1;
    string content_type = 2;
}

message GetAllRegionsRequest {}
message GetAllRegionsResponse {
    repeated metapb.Region regions = 1;
}

message UnsafeForceLeaderRequest {
    uint64 region_id = 1;
    uint64 promised_term = 2;
}
message UnsafeForceLeaderResponse {
    bool ok = 1;
    string message = 2;
}
