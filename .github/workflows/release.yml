name: release

# Tag-driven release. Push an annotated tag like `v0.2.0` (or pre-release
# `v0.2.0-RC1`) and this workflow GPG-signs every artefact, deploys to
# Maven Central via the central-publishing plugin, and drafts a GitHub
# Release attached to the tag.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches pom version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pom="$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)"
          if [ "$tag" != "$pom" ]; then
            echo "Tag v$tag does not match pom version $pom" >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
          server-id: central
          server-username: CENTRAL_USER
          server-password: CENTRAL_PASSWD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Maven deploy
        run: mvn -U -B -ntp deploy -Prelease -DskipTests
        env:
          CENTRAL_USER: ${{ secrets.CENTRAL_USER }}
          CENTRAL_PASSWD: ${{ secrets.CENTRAL_PASSWD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            kv/target/x-kv-server.jar
            pd/target/x-pd-server.jar
            ctl/target/xkv-ctl.jar

  docker:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      PD_IMAGE: ghcr.io/${{ github.repository_owner }}/x-pd
      KV_IMAGE: ghcr.io/${{ github.repository_owner }}/x-kv
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # For release tags (v0.2.0), also tag as "latest"
          if [[ "$VERSION" != *-* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push PD image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.pd
          push: true
          tags: |
            ${{ env.PD_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.is_release == 'true' && format('{0}:latest', env.PD_IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push KV image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.kv
          push: true
          tags: |
            ${{ env.KV_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.is_release == 'true' && format('{0}:latest', env.KV_IMAGE) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
