name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn verify -q

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn package -DskipTests -q

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            kv/target/x-kv-server.jar
            pd/target/x-pd-server.jar
            ctl/target/x-kv-ctl.jar

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build PD image
        run: docker build -f docker/Dockerfile.pd -t x-pd:${{ github.ref_name }} .
      - name: Build KV image
        run: docker build -f docker/Dockerfile.kv -t x-kv:${{ github.ref_name }} .
