name: Soak Test

on:
  schedule:
    # Every night at 02:00 UTC (10:00 CST)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Soak test duration (minutes)"
        required: false
        default: "30"

jobs:
  soak:
    name: Soak Test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run soak test
        run: |
          DURATION=${{ github.event.inputs.duration_minutes || '30' }}
          mvn test -pl tests -am \
            -Dtest=SoakTest \
            -Dsoak.duration.minutes=$DURATION \
            -Dsurefire.failIfNoSpecifiedTests=false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soak-surefire-reports
          path: "**/target/surefire-reports/"
          retention-days: 14
