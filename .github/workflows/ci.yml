name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn compile -q

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn checkstyle:check -q

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/"
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: "tests/target/benchmark-results/"
          retention-days: 30
      - name: Check coverage threshold
        if: always()
        run: |
          threshold=60
          for csv in $(find . -path "*/jacoco/jacoco.csv" 2>/dev/null); do
            module=$(echo "$csv" | sed 's|.*/\(.*\)/target/.*|\1|')
            missed=$(tail -n +2 "$csv" | awk -F',' '{s+=$4} END {print s+0}')
            covered=$(tail -n +2 "$csv" | awk -F',' '{s+=$5} END {print s+0}')
            total=$((missed + covered))
            if [ "$total" -gt 0 ]; then
              pct=$((covered * 100 / total))
              echo "$module: ${pct}% line coverage (${covered}/${total})"
              if [ "$pct" -lt "$threshold" ]; then
                echo "::warning::$module coverage ${pct}% is below ${threshold}% threshold"
              fi
            fi
          done

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn package -DskipTests -q
      - uses: actions/upload-artifact@v4
        with:
          name: fat-jars
          path: |
            kv/target/x-kv-server.jar
            pd/target/x-pd-server.jar
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.pd -t x-pd:latest .
      - run: docker build -f docker/Dockerfile.kv -t x-kv:latest .
