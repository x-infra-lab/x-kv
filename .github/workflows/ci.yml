name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn compile -q

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/"
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: "tests/target/benchmark-results/"
          retention-days: 30

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - run: mvn package -DskipTests -q
      - uses: actions/upload-artifact@v4
        with:
          name: fat-jars
          path: |
            kv/target/x-kv-server.jar
            pd/target/x-pd-server.jar
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.pd -t x-pd:latest .
      - run: docker build -f docker/Dockerfile.kv -t x-kv:latest .
